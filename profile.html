<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Profile - Quantum Learn AI</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

:root{
--bg:#07111f;
--card:#10233a;
--card2:#0d1b2a;
--text:#ffffff;
--primary:#00d9ff;
--danger:#ff3b3b;
--success:#00ff88;
}

body.light{
--bg:#eef4ff;
--card:#ffffff;
--card2:#f3f6ff;
--text:#111111;
--primary:#0077ff;
}

body{
background:var(--bg);
color:var(--text);
min-height:100vh;
display:flex;
flex-direction:column;
transition:0.4s;
overflow-x:hidden;
}

/* NAVBAR */

.navbar{
height:75px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 15px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.left{
display:flex;
align-items:center;
gap:12px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo-box{
width:45px;
height:45px;
border-radius:14px;
background:var(--primary);
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
box-shadow:0 0 15px var(--primary);
}

.logo-text h3{
font-size:17px;
}

.logo-text p{
font-size:11px;
opacity:0.7;
}

.btn{
background:rgba(255,255,255,0.08);
border:none;
color:var(--text);
font-size:17px;
cursor:pointer;
width:45px;
height:45px;
border-radius:14px;
display:flex;
justify-content:center;
align-items:center;
}

/* MAIN */

.container{
flex:1;
padding:18px;
display:flex;
flex-direction:column;
gap:16px;
}

/* PROFILE CARD */

.profile-card{
background:var(--card);
padding:25px;
border-radius:30px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.35);
position:relative;
overflow:hidden;
}

.profile-card::before{
content:"";
position:absolute;
top:-100px;
right:-100px;
width:220px;
height:220px;
background:rgba(255,255,255,0.04);
border-radius:50%;
}

/* AVATAR */

.avatar{
width:120px;
height:120px;
border-radius:50%;
margin:auto;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
font-weight:bold;
background:var(--primary);
overflow:hidden;
border:4px solid var(--primary);
box-shadow:0 0 25px rgba(0,217,255,0.4);
position:relative;
z-index:2;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

/* NAME */

.name{
margin-top:15px;
font-size:22px;
font-weight:bold;
position:relative;
z-index:2;
}

.email-bar{
margin-top:12px;
padding:14px;
background:var(--card2);
border-radius:16px;
font-size:14px;
opacity:0.92;
text-align:center;
word-break:break-word;
position:relative;
z-index:2;
}

/* BADGE */

.badge{
margin-top:12px;
display:inline-block;
padding:8px 14px;
border-radius:30px;
background:rgba(0,255,136,0.12);
border:1px solid rgba(0,255,136,0.3);
color:var(--success);
font-size:12px;
font-weight:bold;
}

/* UPLOAD */

.upload{
margin-top:20px;
position:relative;
z-index:2;
}

.upload input{
display:none;
}

.upload label{
display:inline-block;
padding:13px 18px;
background:var(--primary);
border-radius:15px;
font-size:14px;
font-weight:bold;
cursor:pointer;
color:#07111f;
}

/* INFO GRID */

.info-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.info{
background:var(--card);
padding:18px;
border-radius:22px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.info i{
font-size:26px;
color:var(--primary);
margin-bottom:10px;
}

.info h4{
font-size:13px;
opacity:0.7;
}

.info p{
margin-top:7px;
font-size:14px;
font-weight:bold;
}

/* STATUS */

.status-box{
background:var(--card);
padding:18px;
border-radius:24px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.status-box h3{
margin-bottom:12px;
font-size:18px;
}

.status{
display:flex;
justify-content:space-between;
margin-bottom:12px;
padding:12px;
background:var(--card2);
border-radius:14px;
font-size:14px;
}

/* LOGOUT */

.logout{
margin-top:10px;
width:100%;
padding:15px;
background:var(--danger);
border:none;
border-radius:16px;
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

/* LOADER */

.loader{
display:none;
margin:15px auto 0;
border:4px solid rgba(255,255,255,0.1);
border-top:4px solid var(--primary);
width:35px;
height:35px;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

/* FOOTER */

.footer{
text-align:center;
padding:15px;
font-size:12px;
opacity:0.7;
}

@media(min-width:800px){

body{
display:flex;
justify-content:center;
align-items:center;
background:#06101c;
}

.app{
width:430px;
height:100vh;
overflow:auto;
background:var(--bg);
}

}

</style>

</head>

<body>

<div class="app">

<!-- NAVBAR -->

<div class="navbar">

<div class="left">

<button class="btn"
onclick="history.back()">

<i class="fa-solid fa-arrow-left"></i>

</button>

<div class="logo">

<div class="logo-box">

<i class="fa-solid fa-brain"></i>

</div>

<div class="logo-text">

<h3>Quantum Learn AI</h3>

<p>We Think Wisely</p>

</div>

</div>

</div>

<button class="btn"
onclick="toggleTheme()">

<i class="fa-solid fa-moon"></i>

</button>

</div>

<!-- MAIN -->

<div class="container">

<!-- PROFILE -->

<div class="profile-card">

<div class="avatar"
id="avatar">

U

</div>

<div class="name"
id="name">

Loading...

</div>

<div class="email-bar"
id="email">

Loading email...

</div>

<div class="badge">

Account Active

</div>

<div class="upload">

<input type="file"
id="fileInput"
accept="image/*">

<label for="fileInput">

<i class="fa-solid fa-camera"></i>

Change Profile Picture

</label>

</div>

<div class="loader"
id="loader"></div>

</div>

<!-- INFO -->

<div class="info-grid">

<div class="info">

<i class="fa-solid fa-user-shield"></i>

<h4>Account Type</h4>

<p>Student</p>

</div>

<div class="info">

<i class="fa-solid fa-lock"></i>

<h4>Security</h4>

<p>Protected</p>

</div>

<div class="info">

<i class="fa-solid fa-cloud"></i>

<h4>Cloud Sync</h4>

<p>Enabled</p>

</div>

<div class="info">

<i class="fa-solid fa-robot"></i>

<h4>AI System</h4>

<p>Connected</p>

</div>

</div>

<!-- STATUS -->

<div class="status-box">

<h3>Profile Status</h3>

<div class="status">

<span>Email Verification</span>

<span id="verifyStatus">

Checking...

</span>

</div>

<div class="status">

<span>Firebase Sync</span>

<span>

Active

</span>

</div>

<div class="status">

<span>Session Status</span>

<span>

Online

</span>

</div>

<button class="logout"
onclick="logout()">

Logout

</button>

</div>

</div>

<!-- FOOTER -->

<div class="footer">

© Quantum Learn AI

</div>

</div>

<script type="module">

/* FIREBASE IMPORTS */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-storage.js";

import {
getFirestore,
doc,
setDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyA6RGcEIFPSF25wsMN-7QLg1-EvJrtvLmY",

authDomain: "my-web-e9b90.firebaseapp.com",

projectId: "my-web-e9b90",

storageBucket: "my-web-e9b90.firebasestorage.app",

messagingSenderId: "253275343289",

appId: "1:253275343289:web:169a10b703962d3ae90e68",

measurementId: "G-RDV9JZYJDZ"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const storage =
getStorage(app);

const db =
getFirestore(app);

/* ELEMENTS */

const avatar =
document.getElementById("avatar");

const nameText =
document.getElementById("name");

const emailText =
document.getElementById("email");

const verifyStatus =
document.getElementById("verifyStatus");

const loader =
document.getElementById("loader");

/* THEME */

if(localStorage.getItem("theme") === "light"){
document.body.classList.add("light");
}

window.toggleTheme = function(){

document.body.classList.toggle("light");

localStorage.setItem(
"theme",
document.body.classList.contains("light")
? "light"
: "dark"
);

}

/* USER SESSION */

onAuthStateChanged(auth,
async(user)=>{

if(user){

const email =
user.email;

const uid =
user.uid;

nameText.innerText =
user.displayName ||
email.split("@")[0];

emailText.innerText =
email;

verifyStatus.innerText =
user.emailVerified
? "Verified"
: "Not Verified";

/* GOOGLE PHOTO */

if(user.photoURL){

avatar.innerHTML =
`<img src="${user.photoURL}">`;

}

/* LOAD SAVED FIRESTORE IMAGE */

const docRef =
doc(db,"users",uid);

const docSnap =
await getDoc(docRef);

if(docSnap.exists()){

const data =
docSnap.data();

if(data.profileImage){

avatar.innerHTML =
`<img src="${data.profileImage}">`;

}

}

}else{

window.location.href =
"login.html";

}

});

/* FAST IMAGE UPLOAD */

document
.getElementById("fileInput")
.addEventListener("change",
async function(e){

const file =
e.target.files[0];

if(!file) return;

const user =
auth.currentUser;

if(!user){

alert("User not found.");

return;

}

loader.style.display =
"block";

try{

/* SHOW IMAGE IMMEDIATELY */

const previewURL =
URL.createObjectURL(file);

avatar.innerHTML =
`<img src="${previewURL}">`;

/* FAST STORAGE PATH */

const storageRef =
ref(
storage,
`profileImages/${user.uid}_${Date.now()}`
);

/* UPLOAD */

await uploadBytes(
storageRef,
file
);

/* GET IMAGE URL */

const imageUrl =
await getDownloadURL(
storageRef
);

/* SAVE TO FIRESTORE */

await setDoc(
doc(db,"users",user.uid),
{
profileImage:imageUrl,
email:user.email
},
{ merge:true }
);

/* FINAL IMAGE */

avatar.innerHTML =
`<img src="${imageUrl}">`;

alert(
"Profile picture uploaded successfully."
);

}catch(error){

console.log(error);

alert(
"Failed to upload image. Please check your internet connection."
);

}

loader.style.display =
"none";

});

/* ACTIVE LOGOUT */

window.logout =
async function(){

const confirmLogout =
confirm(
"Are you sure you want to logout?"
);

if(!confirmLogout){

return;

}

try{

await signOut(auth);

/* CLEAR SAVED DATA */

localStorage.removeItem("savedMusic");
localStorage.removeItem("musicPlaying");

/* REDIRECT */

window.location.href =
"login.html";

}catch(error){

console.log(error);

alert(
"Logout failed. Please try again."
);

}

}

</script>

</body>
</html>
