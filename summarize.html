<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>Quantum Learn AI - Summarize Notes</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#0f172a;
color:white;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

/* NAVBAR */

.navbar{
height:72px;
background:#111827;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
border-bottom:1px solid rgba(255,255,255,0.1);
flex-shrink:0;
}

.logo{
display:flex;
flex-direction:column;
}

.logo h1{
font-size:20px;
color:#60a5fa;
}

.logo span{
font-size:12px;
color:#cbd5e1;
margin-top:2px;
}

.profile{
width:46px;
height:46px;
border-radius:50%;
overflow:hidden;
border:2px solid #60a5fa;
cursor:pointer;
background:white;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

/* MAIN */

.main{
flex:1;
padding:15px;
display:flex;
flex-direction:column;
gap:14px;
overflow:hidden;
background:#1e293b;
}

/* SEARCH */

.search-box{
background:#111827;
border-radius:15px;
padding:13px;
display:flex;
align-items:center;
gap:10px;
border:1px solid rgba(255,255,255,0.06);
}

.search-box i{
color:#60a5fa;
font-size:18px;
}

.search-box input{
flex:1;
background:none;
border:none;
outline:none;
color:white;
font-size:15px;
}

/* TEXTAREA */

textarea{
width:100%;
height:130px;
border:none;
outline:none;
resize:none;
border-radius:16px;
padding:16px;
background:#111827;
color:white;
font-size:15px;
line-height:1.7;
border:1px solid rgba(255,255,255,0.06);
}

/* BUTTON AREA */

.button-area{
display:flex;
gap:10px;
}

.button-area button{
flex:1;
height:52px;
border:none;
border-radius:15px;
font-size:15px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.summarize-btn{
background:#60a5fa;
color:white;
}

.clear-btn{
background:#ef4444;
color:white;
}

.copy-btn{
background:#10b981;
color:white;
}

.button-area button:hover{
opacity:0.9;
}

/* RESULT BOX */

.result-box{
flex:1;
background:#111827;
border-radius:16px;
padding:18px;
overflow-y:auto;
line-height:1.9;
border:1px solid rgba(255,255,255,0.06);
}

.result-box::-webkit-scrollbar{
width:4px;
}

.result-box::-webkit-scrollbar-thumb{
background:#60a5fa;
border-radius:10px;
}

/* OUTPUT */

.ai-output h2{
color:#60a5fa;
margin-bottom:15px;
font-size:22px;
}

.ai-output h3{
color:#93c5fd;
margin-top:20px;
margin-bottom:12px;
font-size:18px;
}

.summary-point{
background:#1e293b;
padding:14px;
border-radius:14px;
margin-bottom:14px;
border-left:4px solid #60a5fa;
line-height:1.7;
}

.summary-point strong{
color:#60a5fa;
}

/* LOADING */

.loading{
display:flex;
align-items:center;
gap:12px;
font-size:16px;
}

.spinner{
width:22px;
height:22px;
border:3px solid #334155;
border-top:3px solid #60a5fa;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

/* ERROR */

.error{
color:#ff6b6b;
font-weight:bold;
}

/* FOOTER */

.footer{
height:72px;
background:#111827;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid rgba(255,255,255,0.1);
flex-shrink:0;
}

.footer a{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-decoration:none;
color:#cbd5e1;
font-size:12px;
gap:5px;
transition:0.3s;
}

.footer a i{
font-size:19px;
}

.footer a:hover{
color:#60a5fa;
}

/* MOBILE */

@media(max-width:600px){

.logo h1{
font-size:17px;
}

textarea{
height:120px;
}

.result-box{
font-size:14px;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">

<h1>Quantum Learn AI</h1>

<span>We Think Wisely</span>

</div>

<div class="profile"
onclick="window.location.href='profile.html'">

<img id="profileImage"
src="https://i.ibb.co/2kR5zqN/user.png">

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- SEARCH -->

<div class="search-box">

<i class="fas fa-search"></i>

<input type="text"
placeholder="Search anything..."
id="searchInput">

</div>

<!-- TEXT INPUT -->

<textarea
id="userInput"
placeholder="Paste your long notes, passage or topic here..."></textarea>

<!-- BUTTONS -->

<div class="button-area">

<button class="summarize-btn"
onclick="summarizeText()">

Summarize

</button>

<button class="copy-btn"
onclick="copySummary()">

Copy

</button>

<button class="clear-btn"
onclick="clearAll()">

Clear

</button>

</div>

<!-- RESULT -->

<div id="resultBox"
class="result-box">

AI summarized notes will appear here...

</div>

</div>

<!-- FOOTER -->

<div class="footer">

<a href="menu.html">

<i class="fas fa-home"></i>

<span>Home</span>

</a>

<a href="quiz.html">

<i class="fas fa-question-circle"></i>

<span>Quiz</span>

</a>

<a href="planner.html">

<i class="fas fa-calendar"></i>

<span>Planner</span>

</a>

<a href="profile.html">

<i class="fas fa-user"></i>

<span>Profile</span>

</a>

</div>

<script>

/* PROFILE IMAGE */

const savedProfile =
localStorage.getItem("profileImage");

if(savedProfile){

document.getElementById("profileImage").src =
savedProfile;

}

/* SEARCH SYSTEM */

document.getElementById("searchInput")
.addEventListener("input", function(){

const value =
this.value.toLowerCase();

if(value.includes("home")){
window.location.href = "menu.html";
}

if(value.includes("quiz")){
window.location.href = "quiz.html";
}

if(value.includes("planner")){
window.location.href = "planner.html";
}

if(value.includes("profile")){
window.location.href = "profile.html";
}

});

/* FORMAT SUMMARY */

function formatSummary(text){

const lines = text.split("\n");

let formatted = `
<div class="ai-output">
<h2>Summarized Notes</h2>
`;

lines.forEach((line,index)=>{

line = line.trim();

if(line.length > 0){

formatted += `

<div class="summary-point">

<strong>Point ${index + 1}:</strong><br><br>

${line}

</div>

`;

}

});

formatted += "</div>";

return formatted;

}

/* SUMMARIZE FUNCTION */

async function summarizeText(){

const input =
document.getElementById("userInput").value;

const resultBox =
document.getElementById("resultBox");

if(!input.trim()){

resultBox.innerHTML =

"<div class='error'>Please enter text to summarize.</div>";

return;

}

resultBox.innerHTML = `

<div class="loading">

<div class="spinner"></div>

Summarizing Notes...

</div>

`;

try{

const response = await fetch(

"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=AIzaSyA96pbl7gM0zKYzjCc6_b5cDns5m2fMIHs",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

contents:[

{
parts:[

{
text:

"Summarize this passage into simple, understandable points for students. Use short explanations and make it easy to read:\n\n"

+ input

}

]

}

]

})

}

);

const data =
await response.json();

console.log(data);

const text =
data.candidates[0].content.parts[0].text;

const formatted =
formatSummary(text);

resultBox.innerHTML =
"<div id='typing'></div>";

const typing =
document.getElementById("typing");

let i = 0;

let displayed = "";

const interval =
setInterval(()=>{

displayed += formatted.charAt(i);

typing.innerHTML = displayed;

i++;

if(i >= formatted.length){

clearInterval(interval);

}

},4);

}catch(error){

console.log(error);

resultBox.innerHTML = `

<div class="error">

Failed to summarize notes.

</div>

`;

}

}

/* COPY */

function copySummary(){

const text =
document.getElementById("resultBox").innerText;

navigator.clipboard.writeText(text);

alert("Summary copied!");

}

/* CLEAR */

function clearAll(){

document.getElementById("userInput").value = "";

document.getElementById("resultBox").innerHTML =

"AI summarized notes will appear here...";

}

</script>

</body>
</html>
