<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Quantum Learn AI - Menu</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

:root{

--bg:#07111f;
--bg2:#0d2238;

--nav:#081521;
--section:#10273d;

--card:rgba(255,255,255,0.08);

--border:rgba(255,255,255,0.12);

--primary:#00d9ff;

--text:#ffffff;

--sub:#b7c7d6;

}

.light-mode{

--bg:#edf4ff;
--bg2:#dbe9ff;

--nav:#ffffff;
--section:#f4f8ff;

--card:rgba(255,255,255,0.9);

--border:rgba(0,0,0,0.08);

--primary:#0077ff;

--text:#0c1a2b;

--sub:#5a6b7e;

}

body{

width:100%;
min-height:100vh;

overflow-x:hidden;
overflow-y:auto;

background:
linear-gradient(
135deg,
var(--bg),
var(--bg2)
);

color:var(--text);

display:flex;
flex-direction:column;

}

/* NAVBAR */

.navbar{

min-height:72px;

background:var(--nav);

border-bottom:
1px solid var(--border);

display:flex;
align-items:center;
justify-content:space-between;

padding:12px 14px;

flex-shrink:0;

position:sticky;
top:0;
z-index:100;

backdrop-filter:blur(10px);

}

/* LOGO */

.logo{

display:flex;
align-items:center;
gap:10px;

min-width:0;

}

.logo-circle{

width:44px;
height:44px;

border-radius:14px;

background:
linear-gradient(
135deg,
#00d9ff,
#0077ff
);

display:flex;
justify-content:center;
align-items:center;

font-size:18px;

color:white;

box-shadow:
0 0 16px rgba(0,217,255,0.45);

flex-shrink:0;

}

.logo-text{

min-width:0;

}

.logo-text h1{

font-size:16px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;

}

.logo-text p{

font-size:11px;

color:var(--sub);

margin-top:2px;

}

/* RIGHT NAV */

.right-nav{

display:flex;
align-items:center;
gap:10px;

flex-shrink:0;

}

.menu-btn{

width:42px;
height:42px;

border:none;

border-radius:14px;

background:rgba(255,255,255,0.08);

color:var(--text);

font-size:17px;

cursor:pointer;

}

.profile-btn{

width:44px;
height:44px;

border-radius:50%;

overflow:hidden;

border:2px solid var(--primary);

background:#fff;

cursor:pointer;

}

.profile-btn img{

width:100%;
height:100%;

object-fit:cover;

}

/* MENU POPUP */

.menu-popup{

position:fixed;

top:82px;
right:14px;

width:240px;
max-width:calc(100% - 28px);

background:var(--nav);

border:
1px solid var(--border);

border-radius:22px;

padding:14px;

display:none;

flex-direction:column;

gap:10px;

z-index:1000;

box-shadow:
0 12px 35px rgba(0,0,0,0.45);

}

.menu-popup.active{

display:flex;

animation:show 0.3s ease;

}

@keyframes show{

from{
opacity:0;
transform:translateY(-10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.menu-item{

width:100%;

padding:14px;

border:none;

border-radius:16px;

background:rgba(255,255,255,0.06);

color:var(--text);

display:flex;
align-items:center;
gap:12px;

font-size:14px;

cursor:pointer;

text-align:left;

}

.menu-item i{

color:var(--primary);

font-size:17px;

min-width:20px;

}

/* MAIN */

.main{

flex:1;

background:var(--section);

padding:12px;

display:flex;
flex-direction:column;

gap:12px;

overflow:visible;

}

/* SEARCH */

.search-box{

position:relative;

}

.search-box input{

width:100%;

height:50px;

border:none;

outline:none;

border-radius:18px;

padding:
0 50px 0 16px;

background:var(--card);

border:
1px solid var(--border);

color:var(--text);

font-size:15px;

}

.search-box input::placeholder{

color:var(--sub);

}

.search-box i{

position:absolute;

right:16px;
top:16px;

font-size:18px;

color:var(--primary);

}

/* SEARCH RESULTS */

.search-results{

background:var(--nav);

border-radius:18px;

overflow:hidden;

border:
1px solid var(--border);

display:none;

max-height:160px;

overflow-y:auto;

}

.search-item{

padding:14px;

border-bottom:
1px solid rgba(255,255,255,0.06);

display:flex;
align-items:center;
gap:12px;

cursor:pointer;

font-size:14px;

}

.search-item:last-child{

border-bottom:none;

}

.search-item i{

color:var(--primary);

}

.no-result{

padding:16px;

text-align:center;

color:var(--sub);

}

/* HERO */

.hero{

border-radius:28px;

background:
linear-gradient(
135deg,
rgba(0,217,255,0.12),
rgba(0,119,255,0.08)
);

border:
1px solid var(--border);

padding:20px;

display:flex;
flex-direction:column;

gap:18px;

overflow:hidden;

position:relative;

min-height:auto;

}

.hero::before{

content:"";

position:absolute;

width:160px;
height:160px;

background:
rgba(255,255,255,0.04);

border-radius:50%;

right:-60px;
top:-60px;

}

.hero-top{

position:relative;

z-index:2;

}

.hero-top h2{

font-size:22px;

line-height:1.2;

margin-bottom:8px;

}

.hero-top p{

font-size:13px;

line-height:1.6;

color:var(--sub);

}

/* QUICK BUTTONS */

.quick-grid{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:10px;

position:relative;

z-index:2;

}

.quick-card{

background:rgba(255,255,255,0.08);

border:
1px solid var(--border);

border-radius:20px;

padding:14px 10px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-align:center;

cursor:pointer;

min-height:100px;

transition:0.2s;

}

.quick-card:active{

transform:scale(0.97);

}

.quick-icon{

width:48px;
height:48px;

border-radius:16px;

background:
linear-gradient(
135deg,
#00d9ff,
#0077ff
);

display:flex;
justify-content:center;
align-items:center;

font-size:20px;

color:white;

margin-bottom:8px;

}

.quick-card h3{

font-size:14px;

margin-bottom:4px;

}

.quick-card p{

font-size:11px;

color:var(--sub);

line-height:1.4;

}

/* FOOTER */

.footer{

min-height:80px;

background:var(--nav);

border-top:
1px solid var(--border);

display:flex;
align-items:center;
justify-content:space-around;

padding:8px 4px;

flex-shrink:0;

position:sticky;
bottom:0;

}

/* FOOTER ITEMS */

.footer-item{

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

text-decoration:none;

color:var(--sub);

font-size:10px;

gap:4px;

width:65px;

text-align:center;

}

.footer-icon{

width:42px;
height:42px;

border-radius:14px;

background:rgba(255,255,255,0.06);

display:flex;
justify-content:center;
align-items:center;

font-size:17px;

color:var(--primary);

}

.footer-item.active{

color:var(--primary);

}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">

<div class="logo-circle">

<i class="fa-solid fa-brain"></i>

</div>

<div class="logo-text">

<h1>Quantum Learn AI</h1>

<p>We Think Wisely</p>

</div>

</div>

<div class="right-nav">

<button class="menu-btn"
id="menuBtn">

<i class="fa-solid fa-bars"></i>

</button>

<div class="profile-btn"
onclick="goPage('profile.html')">

<img id="profileImage"
src="https://i.ibb.co/2kR5zqC/user.png">

</div>

</div>

</div>

<div class="menu-popup"
id="menuPopup">

<button class="menu-item"
onclick="goPage('generate.html')">

<i class="fa-solid fa-file-circle-question"></i>

Generate Questions

</button>

<button class="menu-item"
onclick="goPage('assistant.html')">

<i class="fa-solid fa-robot"></i>

AI Assistant

</button>

<button class="menu-item"
onclick="toggleTheme()">

<i class="fa-solid fa-circle-half-stroke"></i>

Change Tone

</button>

</div>

<div class="main">

<div class="search-box">

<input type="text"
id="searchInput"
placeholder="Search features...">

<i class="fa-solid fa-magnifying-glass"></i>

</div>

<div class="search-results"
id="searchResults"></div>

<div class="hero">

<div class="hero-top">

<h2>
Learn Faster With AI
</h2>

<p>
Access all AI tools quickly and improve your learning experience.
</p>

</div>

<div class="quick-grid">

<div class="quick-card"
onclick="goPage('generate.html')">

<div class="quick-icon">

<i class="fa-solid fa-file-circle-question"></i>

</div>

<h3>Generate</h3>

<p>Create AI study questions</p>

</div>

<div class="quick-card"
onclick="goPage('assistant.html')">

<div class="quick-icon">

<i class="fa-solid fa-robot"></i>

</div>

<h3>AI Chat</h3>

<p>Talk with smart AI</p>

</div>

</div>

</div>

</div>

<div class="footer">

<a href="menu.html"
class="footer-item active">

<div class="footer-icon">

<i class="fa-solid fa-house"></i>

</div>

Home

</a>

<a href="profile.html"
class="footer-item">

<div class="footer-icon">

<i class="fa-solid fa-user"></i>

</div>

Profile

</a>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyA6RGcEIFPSF25wsMN-7QLg1-EvJrtvLmY",

authDomain: "my-web-e9b90.firebaseapp.com",

projectId: "my-web-e9b90",

storageBucket: "my-web-e9b90.firebasestorage.app",

messagingSenderId: "253275343289",

appId: "1:253275343289:web:169a10b703962d3ae90e68",

measurementId: "G-RDV9JZYJDZ"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const profileImage =
document.getElementById(
"profileImage"
);

/* FIXED AUTH */

onAuthStateChanged(auth, (user) => {

if(user){

if(user.photoURL){

profileImage.src =
user.photoURL;

}

}else{

window.location.href =
"login.html";

}

});
  
/* SEARCH */

const pages = [

{
name:"Profile",
icon:"fa-user",
page:"profile.html"
},

{
name:"Generate Questions",
icon:"fa-file-circle-question",
page:"generate.html"
},

{
name:"AI Assistant",
icon:"fa-robot",
page:"assistant.html"
}

];

const searchInput =
document.getElementById(
"searchInput"
);

const searchResults =
document.getElementById(
"searchResults"
);

searchInput.addEventListener(
"input",
()=>{

const value =
searchInput.value
.toLowerCase()
.trim();

if(value === ""){

searchResults.style.display =
"none";

return;

}

const filtered =

pages.filter(item =>

item.name
.toLowerCase()
.includes(value)

);

searchResults.innerHTML = "";

searchResults.style.display =
"block";

if(filtered.length === 0){

searchResults.innerHTML =

`
<div class="no-result">

No match found

</div>
`;

return;

}

filtered.forEach(item=>{

searchResults.innerHTML +=

`
<div class="search-item"
onclick="goPage('${item.page}')">

<i class="fa-solid ${item.icon}"></i>

${item.name}

</div>
`;

});

});

/* MENU */

const menuBtn =
document.getElementById(
"menuBtn"
);

const menuPopup =
document.getElementById(
"menuPopup"
);

menuBtn.onclick = ()=>{

menuPopup.classList.toggle(
"active"
);

}

/* CLOSE MENU */

document.addEventListener(
"click",
(e)=>{

if(
!menuPopup.contains(e.target)
&&
!menuBtn.contains(e.target)
){

menuPopup.classList.remove(
"active"
);

}

});

/* NAVIGATION */

window.goPage =
function(page){

window.location.href =
page;

}

/* THEME */

window.toggleTheme =
function(){

document.body.classList.toggle(
"light-mode"
);

localStorage.setItem(
"theme",

document.body.classList.contains(
"light-mode"
)

?

"light"

:

"dark"
);

}

/* LOAD THEME */

if(
localStorage.getItem(
"theme"
) === "light"
){

document.body.classList.add(
"light-mode"
);

}

</script>

</body>
</html>
