<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Quantum Learn AI - Forgot Password</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

:root{

--bg:#07111f;
--bg2:#0b1f35;
--card:rgba(255,255,255,0.08);
--border:rgba(255,255,255,0.12);
--primary:#00d9ff;
--text:#ffffff;
--success:#00ff99;
--danger:#ff4d6d;

}

body{

min-height:100vh;

background:
linear-gradient(
135deg,
var(--bg),
var(--bg2),
#10233a
);

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;

color:var(--text);

position:relative;

}

/* BACKGROUND GLOW */

.glow{

position:absolute;

border-radius:50%;

filter:blur(100px);

opacity:0.4;

animation:float 6s infinite ease-in-out;

}

.glow1{

width:300px;
height:300px;

background:#00d9ff;

top:-120px;
left:-120px;

}

.glow2{

width:300px;
height:300px;

background:#7a5cff;

bottom:-120px;
right:-120px;

animation-delay:2s;

}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(20px);
}

100%{
transform:translateY(0px);
}

}

/* MAIN APP */

.app{

width:100%;
max-width:430px;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

position:relative;
z-index:2;

}

/* CARD */

.card{

width:100%;

background:var(--card);

border:1px solid var(--border);

backdrop-filter:blur(15px);

padding:35px 25px;

border-radius:35px;

box-shadow:
0 10px 40px rgba(0,0,0,0.45);

animation:show 0.7s ease;

position:relative;

overflow:hidden;

}

/* LIGHT EFFECT */

.card::before{

content:"";

position:absolute;

width:220px;
height:220px;

background:rgba(255,255,255,0.04);

border-radius:50%;

top:-120px;
right:-120px;

}

/* ANIMATION */

@keyframes show{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0px);
}

}

/* LOGO */

.logo{

text-align:center;

position:relative;
z-index:2;

}

.logo-circle{

width:100px;
height:100px;

margin:auto;

border-radius:30px;

background:
linear-gradient(
135deg,
#00d9ff,
#0077ff
);

display:flex;
justify-content:center;
align-items:center;

font-size:42px;

box-shadow:
0 0 25px rgba(0,217,255,0.45);

}

.logo h1{

margin-top:20px;

font-size:28px;

}

.logo p{

margin-top:10px;

font-size:14px;

opacity:0.75;

line-height:1.7;

}

/* INPUT */

.input-box{

margin-top:28px;

position:relative;

}

.input-box i{

position:absolute;

top:18px;
left:15px;

opacity:0.7;

font-size:15px;

}

.input-box input{

width:100%;

padding:16px 16px 16px 45px;

border:none;
outline:none;

border-radius:18px;

background:rgba(255,255,255,0.08);

color:white;

font-size:15px;

border:1px solid rgba(255,255,255,0.06);

}

.input-box input::placeholder{

color:#ccc;

}

/* BUTTON */

.main-btn{

width:100%;

margin-top:22px;

padding:16px;

border:none;

border-radius:18px;

background:
linear-gradient(
135deg,
#00d9ff,
#0077ff
);

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

transition:0.3s;

}

.main-btn:hover{

transform:scale(1.02);

}

/* MESSAGE */

.message{

margin-top:22px;

padding:15px;

border-radius:16px;

font-size:14px;

line-height:1.7;

display:none;

animation:fade 0.5s ease;

}

.success{

background:rgba(0,255,153,0.12);

border:1px solid rgba(0,255,153,0.3);

color:var(--success);

}

.error{

background:rgba(255,77,109,0.12);

border:1px solid rgba(255,77,109,0.3);

color:#ff9db0;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0px);
}

}

/* LOADER */

.loader{

display:none;

margin:25px auto 0;

width:45px;
height:45px;

border-radius:50%;

border:4px solid rgba(255,255,255,0.1);

border-top:4px solid var(--primary);

animation:spin 1s linear infinite;

}

@keyframes spin{

100%{
transform:rotate(360deg);
}

}

/* BACK BUTTON */

.back-btn{

margin-top:20px;

width:100%;

padding:15px;

border:none;

border-radius:18px;

background:rgba(255,255,255,0.08);

color:white;

font-size:15px;

cursor:pointer;

}

/* FOOTER */

.footer{

margin-top:25px;

text-align:center;

font-size:12px;

opacity:0.6;

}

/* MOBILE */

@media(max-width:500px){

.card{

padding:30px 20px;

}

.logo-circle{

width:90px;
height:90px;

font-size:36px;

}

.logo h1{

font-size:25px;

}

}

</style>

</head>

<body>

<!-- GLOW EFFECT -->

<div class="glow glow1"></div>

<div class="glow glow2"></div>

<!-- APP -->

<div class="app">

<div class="card">

<!-- LOGO -->

<div class="logo">

<div class="logo-circle">

<i class="fa-solid fa-key"></i>

</div>

<h1>Forgot Password</h1>

<p>

Recover your Quantum Learn AI account securely by verifying your email address.

</p>

</div>

<!-- EMAIL -->

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input type="email"
id="email"
placeholder="Enter your email address">

</div>

<!-- BUTTON -->

<button class="main-btn"
onclick="resetPassword()">

Send Recovery Link

</button>

<!-- LOADER -->

<div class="loader"
id="loader"></div>

<!-- SUCCESS -->

<div class="message success"
id="successBox">

Password reset email has been sent successfully.

</div>

<!-- ERROR -->

<div class="message error"
id="errorBox">

Something went wrong.

</div>

<!-- BACK -->

<button class="back-btn"
onclick="window.location.href='login.html'">

Back To Login

</button>

<!-- FOOTER -->

<div class="footer">

© Quantum Learn AI • We Think Wisely

</div>

</div>

</div>

<script type="module">

/* FIREBASE */

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,

sendPasswordResetEmail

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

/* CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyA6RGcEIFPSF25wsMN-7QLg1-EvJrtvLmY",

authDomain: "my-web-e9b90.firebaseapp.com",

projectId: "my-web-e9b90",

storageBucket: "my-web-e9b90.firebasestorage.app",

messagingSenderId: "253275343289",

appId: "1:253275343289:web:169a10b703962d3ae90e68",

measurementId: "G-RDV9JZYJDZ"

};

/* INITIALIZE */

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

/* ELEMENTS */

const loader =
document.getElementById("loader");

const successBox =
document.getElementById("successBox");

const errorBox =
document.getElementById("errorBox");

/* RESET PASSWORD */

window.resetPassword =
async function(){

const email =
document.getElementById("email").value.trim();

successBox.style.display =
"none";

errorBox.style.display =
"none";

/* VALIDATION */

if(email === ""){

errorBox.innerHTML =
"Please enter your email address.";

errorBox.style.display =
"block";

return;

}

loader.style.display =
"block";

try{

await sendPasswordResetEmail(
auth,
email
);

loader.style.display =
"none";

successBox.innerHTML =

"Recovery link has been sent to your email successfully. Please check your inbox.";

successBox.style.display =
"block";

}catch(error){

loader.style.display =
"none";

/* CUSTOM ERRORS */

if(error.code ===
"auth/user-not-found"){

errorBox.innerHTML =
"No account found with this email.";

}else if(error.code ===
"auth/invalid-email"){

errorBox.innerHTML =
"Invalid email address.";

}else{

errorBox.innerHTML =
error.message;

}

errorBox.style.display =
"block";

}

}

</script>

</body>
</html>
